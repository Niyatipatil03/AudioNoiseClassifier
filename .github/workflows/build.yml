name: Flutter Offline Build

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install AI Tools
        run: |
          pip install --no-cache-dir typing_extensions==4.10.0
          pip install --no-cache-dir torch==2.1.2 torchvision==0.16.2
          pip install onnx==1.14.1
          pip install tensorflow==2.13.0
          pip install tensorflow-probability==0.21.0
          pip install git+https://github.com/onnx/onnx-tensorflow.git

      - name: Convert Model to TFLite
        run: |
          python convert_model.py
          # Check if the file was actually created
          if [ ! -f "model.tflite" ]; then
            echo "ERROR: model.tflite was not created!"
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.16.9'

      - name: Build Project Structure
        run: |
          # 1. Backup your custom files
          cp pubspec.yaml pubspec_backup.yaml
          cp lib/main.dart main_backup.dart

          # 2. Recreate the Android shell
          rm -rf android
          flutter create --project-name=audio_noise_classifier --platforms=android .

          # 3. Restore your custom files
          mv pubspec_backup.yaml pubspec.yaml
          mkdir -p lib
          mv main_backup.dart lib/main.dart

          # 4. FORCE the model into the assets folder
          mkdir -p assets
          cp model.tflite assets/model.tflite

          # 5. List files to verify (visible in logs)
          ls -R assets/

      - name: Add Permissions & SDK Fix
        run: python add_perms.py

      - name: Build APK
        run: |
          flutter pub get
          
          flutter build apk \
          --release \
          --split-per-abi \
          --target-platform=android-arm64 \
          --extra-gen-snapshot-options=--min-sdk-version=26


      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: offline-apk
          path: build/app/outputs/flutter-apk/app-release.apk
